<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Daily Trending</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="shell">
    <!-- LEFT SIDEBAR -->
    <nav id="sidebar">
      <div class="sidebar-header">
        <h1 class="logo">Daily Trending</h1>
        <span id="dateLabel" class="date-label"></span>
      </div>
      <ul id="navList" class="nav-list">
        <!-- JS populates -->
      </ul>
      <div class="sidebar-footer">
        <button data-theme-toggle aria-label="Toggle theme"></button>
      </div>
    </nav>

    <!-- MAIN FEED -->
    <main id="feed">
      <div id="feedHeader" class="feed-header">
        <h2 id="feedTitle" class="feed-title"></h2>
        <span id="feedCount" class="feed-count"></span>
      </div>
      <div id="feedContent" class="feed-content">
        <!-- JS renders posts here -->
      </div>
    </main>
  </div>

  <div id="thumbPreview" class="thumb-preview">
    <img id="thumbPreviewImg" alt="">
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
